databaseChangeLog:
  - changeSet:
      id: 015-create-message-file-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: archive
                tableName: chat_message_files
      changes:
        - createTable:
            schemaName: archive
            tableName: chat_message_files
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: message_id
                  type: uuid
              - column:
                  name: file_url
                  type: varchar(500)
              - column:
                  name: file_size
                  type: bigint

      rollback:
        - dropTable:
            schemaName: archive
            tableName: chat_message_files