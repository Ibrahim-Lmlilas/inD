databaseChangeLog:
  - changeSet:
      id: 014-create-chat-message-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: archive
                tableName: chat_messages
      changes:
        - createTable:
            schemaName: archive
            tableName: chat_messages
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: channel_id
                  type: uuid
              - column:
                  name: sender_id
                  type: uuid
              - column:
                  name: message_type
                  type: varchar(50)
              - column:
                  name: content
                  type: text
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: sent_at
                  type: timestamp
              - column:
                  name: delivered_at
                  type: timestamp
              - column:
                  name: read_at
                  type: timestamp

      rollback:
        - dropTable:
            schemaName: archive
            tableName: chat_messages