databaseChangeLog:
  - changeSet:
      id: 017-create-rating-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: archive
                tableName: rating
      changes:
        - createTable:
            schemaName: archive
            tableName: rating
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: ride_id
                  type: uuid
              - column:
                  name: sender_id
                  type: uuid
              - column:
                  name: receiver_id
                  type: uuid
              - column:
                  name: rating_values_id
                  type: uuid
              - column:
                  name: rating_type
                  type: varchar(50)
              - column:
                  name: created_at
                  type: timestamp

      rollback:
        - dropTable:
            schemaName: archive
            tableName: rating