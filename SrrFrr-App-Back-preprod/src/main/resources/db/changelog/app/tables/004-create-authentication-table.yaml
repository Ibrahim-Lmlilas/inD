databaseChangeLog:
  - changeSet:
      id: 004-create-authentication-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: app_mobile
                tableName: authentication
      changes:
        - createTable:
            schemaName: app_mobile
            tableName: authentication
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: refresh_token
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: is_valid
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: fcm_token
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: device_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: passenger_id
                  type: uuid
                  constraints:
                    nullable: false

      rollback:
        - dropTable:
            schemaName: app_mobile
            tableName: authentication
