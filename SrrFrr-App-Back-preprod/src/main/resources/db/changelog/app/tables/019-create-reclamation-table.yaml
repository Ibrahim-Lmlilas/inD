databaseChangeLog:
  - changeSet:
      id: 019-create-reclamation-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: app_mobile
                tableName: reclamation
      changes:
        - createTable:
            schemaName: app_mobile
            tableName: reclamation
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: passenger_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: ride_id
                  type: uuid
              - column:
                  name: content
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

      rollback:
        - dropTable:
            schemaName: app_mobile
            tableName: reclamation
