databaseChangeLog:
  - changeSet:
      id: 003-create-driver-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: app_mobile
                tableName: driver
      changes:
        - createTable:
            schemaName: app_mobile
            tableName: driver
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cin_recto
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: cin_verso
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: cin_code
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: selfie
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: validated_at
                  type: timestamp
              - column:
                  name: rejected_at
                  type: timestamp
              - column:
                  name: vehicle_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_picture
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_registration_recto
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_registration_verso
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_registration_code
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_brand
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_model
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_color
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: production_year
                  type: varchar(4)
                  constraints:
                    nullable: false
              - column:
                  name: approval
                  type: varchar(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: online
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: total_rides
                  type: integer
                  defaultValue: 0
              - column:
                  name: rating
                  type: double precision
                  defaultValue: 0.0
              - column:
                  name: is_verified
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: active_subscription_id
                  type: uuid
        - sql:
            sql: >
              ALTER TABLE app_mobile.driver 
              ADD CONSTRAINT chk_driver_vehicle_type 
              CHECK (vehicle_type IN ('CAR', 'MOTORCYCLE', 'TRUCK'))

        - sql:
            sql: >
              ALTER TABLE app_mobile.driver 
              ADD CONSTRAINT chk_driver_approval 
              CHECK (approval IN ('PENDING', 'VALIDATED', 'REJECTED'))

      rollback:
        - dropTable:
            schemaName: app_mobile
            tableName: driver
