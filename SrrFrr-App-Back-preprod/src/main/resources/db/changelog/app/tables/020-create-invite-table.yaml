databaseChangeLog:
  - changeSet:
      id: 020-create-invite-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: app_mobile
                tableName: invite
      changes:
        - createTable:
            schemaName: app_mobile
            tableName: invite
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: passenger_id
                  type: uuid
              - column:
                  name: invite_phone_number
                  type: varchar(20)
              - column:
                  name: invited_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

      rollback:
        - dropTable:
            schemaName: app_mobile
            tableName: invite
