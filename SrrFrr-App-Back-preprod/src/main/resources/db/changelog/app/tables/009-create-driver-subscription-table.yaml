databaseChangeLog:
  - changeSet:
      id: 009-create-driver-subscription-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: app_mobile
                tableName: driver_subscription
      changes:
        - createTable:
            schemaName: app_mobile
            tableName: driver_subscription
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: driver_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: subscription_plan_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: rides_used
                  type: integer
                  defaultValue: 0
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - sql:
            sql: >
              ALTER TABLE app_mobile.driver_subscription 
              ADD CONSTRAINT chk_driver_subscription_status 
              CHECK (status IN ('ACTIVE', 'EXPIRED', 'CANCELLED'))
      rollback:
        - dropTable:
            schemaName: app_mobile
            tableName: driver_subscription
