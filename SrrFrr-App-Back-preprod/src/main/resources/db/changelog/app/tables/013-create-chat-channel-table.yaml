databaseChangeLog:
  - changeSet:
      id: 013-create-chat-channel-table
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: app_mobile
                tableName: chat_channels
      changes:
        - createTable:
            schemaName: app_mobile
            tableName: chat_channels
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ride_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: driver_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: passenger_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_message_at
                  type: timestamp

      rollback:
        - dropTable:
            schemaName: app_mobile
            tableName: chat_channels
