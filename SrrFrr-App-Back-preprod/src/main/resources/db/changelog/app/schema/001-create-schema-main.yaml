databaseChangeLog:
  - changeSet:
      id: 001-create-schema-app_mobile
      author: zineb
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: >
              SELECT COUNT(*)
              FROM information_schema.schemata
              WHERE schema_name = 'app_mobile'
      changes:
        - sql:
            sql: CREATE SCHEMA app_mobile;
            comment: Creates main application schema

        # Grant USAGE permission to public (or specific users)
        - sql:
            sql: GRANT USAGE ON SCHEMA app_mobile TO PUBLIC;
            comment: Grant schema usage to all users

        # Grant CREATE permission if needed
        - sql:
            sql: GRANT CREATE ON SCHEMA app_mobile TO PUBLIC;
            comment: Allow users to create objects in schema

      rollback:
        - sql:
            sql: DROP SCHEMA IF EXISTS app_mobile CASCADE;
            comment: Drops schema with all contained objects
