        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: rating
            baseColumnNames: rating_values_id
            referencedTableSchemaName: app_mobile
            referencedTableName: rating_values
            referencedColumnNames: id
            constraintName: fk_rating_values
            onDelete: RESTRICT

        # Notification FK
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: notification
            baseColumnNames: receiver_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_notification_receiver
