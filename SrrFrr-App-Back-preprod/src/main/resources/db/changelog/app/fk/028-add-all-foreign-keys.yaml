        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: reclamation
            baseColumnNames: ride_id
            referencedTableSchemaName: app_mobile
            referencedTableName: rides
            referencedColumnNames: id
            constraintName: fk_reclamation_ride
            onDelete: SET NULL

        # Invite FK
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: invite
            baseColumnNames: passenger_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_invite_passenger
