databaseChangeLog:
  - changeSet:
      id: 028-add-all-foreign-keys
      author: zineb
      changes:
        # Authentication FK
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: authentication
            baseColumnNames: passenger_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_authentication_passenger
            onDelete: CASCADE

        # Driver FKs
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: driver
            baseColumnNames: id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_driver_passenger
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: driver
            baseColumnNames: active_subscription_id
            referencedTableSchemaName: app_mobile
            referencedTableName: driver_subscription
            referencedColumnNames: id
            constraintName: fk_driver_active_subscription
            onDelete: SET NULL

        # Wallet FK
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: wallet
            baseColumnNames: passenger_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_wallet_passenger
            onDelete: CASCADE

        # Wallet Transactions FK
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: wallet_transactions
            baseColumnNames: wallet_id
            referencedTableSchemaName: app_mobile
            referencedTableName: wallet
            referencedColumnNames: id
            constraintName: fk_wallet_transaction_wallet
            onDelete: CASCADE

        # Rides FKs
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: rides
            baseColumnNames: passenger_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_rides_passenger
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: rides
            baseColumnNames: driver_id
            referencedTableSchemaName: app_mobile
            referencedTableName: driver
            referencedColumnNames: id
            constraintName: fk_rides_driver
            onDelete: SET NULL

        # Driver Subscription FKs
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: driver_subscription
            baseColumnNames: driver_id
            referencedTableSchemaName: app_mobile
            referencedTableName: driver
            referencedColumnNames: id
