        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: chat_messages
            baseColumnNames: sender_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_chat_message_sender
            onDelete: CASCADE

        # Chat Message Files FK
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: chat_message_files
            baseColumnNames: message_id
            referencedTableSchemaName: app_mobile
            referencedTableName: chat_messages
            referencedColumnNames: id
            constraintName: fk_message_file_message
            onDelete: CASCADE

        # Rating FKs
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: rating
            baseColumnNames: ride_id
            referencedTableSchemaName: app_mobile
