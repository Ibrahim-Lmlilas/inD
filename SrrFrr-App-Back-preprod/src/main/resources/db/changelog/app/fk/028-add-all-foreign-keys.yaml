        # Loyalty Transactions FK
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: loyalty_transactions
            baseColumnNames: passenger_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_loyalty_transaction_passenger
            onDelete: CASCADE

        # Chat Channels FKs
        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: chat_channels
            baseColumnNames: ride_id
            referencedTableSchemaName: app_mobile
            referencedTableName: rides
            referencedColumnNames: id
            constraintName: fk_chat_channel_ride
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: chat_channels
            baseColumnNames: driver_id
            referencedTableSchemaName: app_mobile
            referencedTableName: driver
            referencedColumnNames: id
            constraintName: fk_chat_channel_driver
