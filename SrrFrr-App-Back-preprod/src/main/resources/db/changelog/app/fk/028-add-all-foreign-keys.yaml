        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: rating
            baseColumnNames: sender_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_rating_sender
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: app_mobile
            baseTableName: rating
            baseColumnNames: receiver_id
            referencedTableSchemaName: app_mobile
            referencedTableName: passenger
            referencedColumnNames: id
            constraintName: fk_rating_receiver
