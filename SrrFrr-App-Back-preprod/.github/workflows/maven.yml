      #       exit 1
      #     EOF

      - name: Rollback on Failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            APP_DIR="/home/${{ secrets.EC2_USER }}/api/target"
            
            echo "=========================================="
            echo "DEPLOYMENT FAILED - INITIATING ROLLBACK"
            echo "=========================================="
            
            if [ -f "$APP_DIR/old_application.jar" ]; then
              echo "Restoring previous version..."
              mv "$APP_DIR/old_application.jar" "$APP_DIR/application.jar"
              
              echo "Restarting service with previous version..."
              sudo systemctl restart srrfrr.service
              
              # Wait for rollback to complete
              sleep 10
              
              if sudo systemctl is-active --quiet srrfrr.service; then
                echo "=========================================="
                echo "ROLLBACK SUCCESSFUL"
                echo "Service restored to previous version"
                echo "=========================================="
              else
                echo "=========================================="
                echo "ROLLBACK FAILED"
                echo "Service status:"
                sudo systemctl status srrfrr.service --no-pager || true
                echo "=========================================="
                exit 1
              fi
            else
              echo "=========================================="
              echo "ERROR: No backup JAR found for rollback"
              echo "=========================================="
              exit 1
            fi
          EOF

      - name: Clean Maven Build
        if: always()
        run: |
          ./mvnw clean

      - name: Cleanup SSH Private Key
        if: always()
        run: |
          rm -f private_key.pem

