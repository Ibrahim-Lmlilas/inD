name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - preprod
      - main
      - dev

  pull_request:
    branches:
      - main
      - preprod
      - dev

jobs:
  verification:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.APP_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd "pg_isready -U db_admin -d srrfrrdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data:rw,noexec,nosuid
        ports:
          - 5430:5432

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      # Test database configuration
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5430
      TEST_DB_NAME: ${{ secrets.POSTGRES_DB }}
      TEST_DB_USER: ${{ secrets.APP_USERNAME }}
      TEST_DB_PASS: ${{ secrets.POSTGRES_PASSWORD }}

      # Production database env vars
      DATA_SOURCE_URL: jdbc:postgresql://localhost:5430/${{ secrets.POSTGRES_DB }}
      DATA_SOURCE_USERNAME: ${{ secrets.APP_USERNAME }}
      DATA_SOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      # Redis configuration
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Install PostgreSQL client and tools
        run: |
          echo "Installing necessary tools..."
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-client \
            postgresql-contrib \
            netcat-openbsd

      - name: Wait for PostgreSQL to be fully ready
        run: |
          set -e
          echo "Waiting for PostgreSQL to be fully operational..."
          MAX_RETRIES=10
          RETRY_COUNT=0
          SLEEP_TIME=5

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if pg_isready -h "$TEST_DB_HOST" -p "$TEST_DB_PORT" -U "$TEST_DB_USER" -d "$TEST_DB_NAME" 2>/dev/null; then
              echo "PostgreSQL connection successful!"

              if PGPASSWORD="$TEST_DB_PASS" psql -h "$TEST_DB_HOST" -p "$TEST_DB_PORT" -U "$TEST_DB_USER" -d "$TEST_DB_NAME" -c "SELECT 1;" 2>/dev/null; then
                echo "PostgreSQL is fully operational and accepting queries"
                break
              else
                echo "PostgreSQL is listening but not yet accepting queries..."
              fi
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Waiting for PostgreSQL... (attempt $RETRY_COUNT/$MAX_RETRIES)"
            sleep $SLEEP_TIME
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "ERROR: PostgreSQL failed to become fully ready"
            exit 1
          fi

      - name: Install Redis client
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Wait for Redis to be ready
        run: |
          set -e
          echo "Waiting for Redis to be operational..."
          MAX_RETRIES=10
          RETRY_COUNT=0
          SLEEP_TIME=3

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if redis-cli -h localhost -p 6379 ping 2>/dev/null | grep -q "PONG"; then
              echo "Redis is operational!"
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Waiting for Redis... (attempt $RETRY_COUNT/$MAX_RETRIES)"
            sleep $SLEEP_TIME
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "ERROR: Redis failed to become ready"
            exit 1
          fi

      - name: Create liquibase user and grant permissions
        run: |
          echo "Creating liquibase user..."
          PGPASSWORD="$TEST_DB_PASS" psql -h "$TEST_DB_HOST" -p "$TEST_DB_PORT" -U "$TEST_DB_USER" -d "$TEST_DB_NAME" << 'EOF'
          -- Create liquibase user
          CREATE USER ${{ secrets.LIQUIBASE_USERNAME }} WITH PASSWORD '${{ secrets.POSTGRES_PASSWORD }}';

          -- Grant database-level permissions
          GRANT CONNECT ON DATABASE ${{ secrets.POSTGRES_DB }} TO ${{ secrets.LIQUIBASE_USERNAME }};
          GRANT CREATE ON DATABASE ${{ secrets.POSTGRES_DB }} TO ${{ secrets.LIQUIBASE_USERNAME }};

          -- Grant public schema permissions
          GRANT USAGE ON SCHEMA public TO ${{ secrets.LIQUIBASE_USERNAME }};
          GRANT CREATE ON SCHEMA public TO ${{ secrets.LIQUIBASE_USERNAME }};
          GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO ${{ secrets.LIQUIBASE_USERNAME }};
          GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO ${{ secrets.LIQUIBASE_USERNAME }};
          GRANT ALL PRIVILEGES ON ALL FUNCTIONS IN SCHEMA public TO ${{ secrets.LIQUIBASE_USERNAME }};

          -- Grant default privileges for future objects
          ALTER DEFAULT PRIVILEGES FOR USER ${{ secrets.LIQUIBASE_USERNAME }} IN SCHEMA public 
              GRANT ALL PRIVILEGES ON TABLES TO ${{ secrets.LIQUIBASE_USERNAME }};
          ALTER DEFAULT PRIVILEGES FOR USER ${{ secrets.LIQUIBASE_USERNAME }} IN SCHEMA public 
              GRANT ALL PRIVILEGES ON SEQUENCES TO ${{ secrets.LIQUIBASE_USERNAME }};
          ALTER DEFAULT PRIVILEGES FOR USER ${{ secrets.LIQUIBASE_USERNAME }} IN SCHEMA public 
              GRANT ALL PRIVILEGES ON FUNCTIONS TO ${{ secrets.LIQUIBASE_USERNAME }};
          EOF

          echo "liquibase user created and permissions granted successfully"

      - name: Create Liquibase properties file
        run: |
          echo "Creating Liquibase properties file..."
          cat > liquibase.properties << EOF
          url=jdbc:postgresql://localhost:5430/${{ secrets.POSTGRES_DB }}
          username=${{ secrets.LIQUIBASE_USERNAME }}
          password=${{ secrets.POSTGRES_PASSWORD }}
          changeLogFile=src/main/resources/db/changelog/db.changelog-master.yaml
          driver=org.postgresql.Driver
          EOF

          echo "Liquibase properties file created successfully"
          cat liquibase.properties

      - name: Validate Liquibase
        run: |
          echo "Validating Liquibase changelog..."
          ./mvnw liquibase:validate

      - name: Run Liquibase migrations
        run: |
          echo "Running Liquibase migrations..."
          ./mvnw liquibase:update

      - name: Run comprehensive test suite
        env:
          DATA_SOURCE_URL: jdbc:postgresql://localhost:5430/${{ secrets.POSTGRES_DB }}
          APPMOBILE_DATASOURCE_USERNAME: ${{ secrets.APP_USERNAME }}
          APPMOBILE_DATASOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          LIQUIBASE_USERNAME: ${{ secrets.LIQUIBASE_USERNAME }}
          LIQUIBASE_PASSWORD: ${{ secrets.LIQUIBASE_PASSWORD }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          HIBERNATE_MAIN_DDL_AUTO: validate
          HIBERNATE_ARCHIVE_DDL_AUTO: validate
          JWT_SECRET: ${{ secrets.JWT_SECRET_KEY }}
          JWT_INTERNAL_SECRET: ${{ secrets.JWT_INTERNAL_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SPRING_JPA_SHOW_SQL: false
          SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: false
          SPRING_PROFILES_ACTIVE: test
          SERVER_PORT: 8080
        run: |
          set -e
          echo "Starting test execution..."

          ./mvnw -B --no-transfer-progress test \
            -Dmaven.test.failure.ignore=false \
            -Dmaven.test.redirectTestOutputToFile=false

          echo "Test execution completed successfully"

      - name: Build application
        if: success()
        run: |
          echo "Building application JAR..."
          ./mvnw -B --no-transfer-progress package -DskipTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs-${{ github.run_id }}
          path: |
            **/spring.log
            **/application.log
            **/logs/
          retention-days: 7

      - name: Upload JAR artifact
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preprod')
        uses: actions/upload-artifact@v4
        with:
          name: srrfrr-app-${{ github.sha }}
          path: target/*.jar
          retention-days: 30

  deploy:
    needs: verification
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/preprod') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod_env' || (github.ref == 'refs/heads/preprod' && 'preprod_env') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 and Maven
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Build JAR
        run: |
          chmod +x ./mvnw
          ./mvnw package -DskipTests

      - name: Create SSH Private Key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Backup Existing JAR on AWS
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            APP_DIR="/home/${{ secrets.EC2_USER }}/api/target"
            
            # Remove old backup
            rm -f "$APP_DIR/old_application.jar"
            
            # Backup current JAR if it exists
            if [ -f "$APP_DIR/application.jar" ]; then
              echo "Backing up current application.jar..."
              cp "$APP_DIR/application.jar" "$APP_DIR/old_application.jar"
              echo "Backup completed successfully"
            else
              echo "No existing application.jar to backup"
            fi
          EOF

      - name: Upload JAR to AWS
        run: |
          scp -o StrictHostKeyChecking=no -i private_key.pem ./target/*.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/api/target/application.jar

      # - name: Restart Java App and Verify Health
